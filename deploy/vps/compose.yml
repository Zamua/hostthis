# Production compose for a single-host deploy behind a TLS-terminating
# reverse proxy.
#
# This file is separate from the root docker-compose.yml so the root
# one stays scoped to local dev (shifted ports). Build context points
# at the repo root via the relative path.
#
# Operator-tunable settings come from environment variables — set them
# in the shell, `docker compose --env-file ...`, or a local
# (untracked) `.env` next to this file:
#
#   HOSTTHIS_APEX_DOMAIN  public apex (e.g. hostthis.dev)
#   HOSTTHIS_URL_MODE     `subdomain` (prod with wildcard cert) or `path`
#   HOSTTHIS_PUBLIC_SCHEME  `https` (or `http` if the proxy doesn't TLS)
#   HOSTTHIS_DATA_DIR     defaults to ./data (relative to this compose file)
#
# Run from the repo root:
#   sudo docker compose -f deploy/vps/compose.yml up -d --build
#   sudo docker compose -f deploy/vps/compose.yml logs -f
#   sudo docker compose -f deploy/vps/compose.yml down
#
# Expected operator setup:
#   - Host has nothing on :22 (admin SSH moved to a non-default port).
#   - Firewall allows inbound on 22/tcp.
#   - Reverse proxy terminates TLS for HOSTTHIS_APEX_DOMAIN and proxies
#     /p/* (and any subdomain traffic, in subdomain mode) to 127.0.0.1:8080.
#   - The host data directory exists and is chowned to uid 65532
#     (distroless 'nonroot'). `make deploy` handles this.

services:
  hostthis:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: hostthis:prod
    container_name: hostthis
    restart: unless-stopped
    ports:
      # Host :22 → container's SSH; users type `ssh <apex>`.
      # Host :8080 → container's HTTP; proxy fronts subdomain + /p/* traffic.
      - "22:2222"
      - "127.0.0.1:8080:8080"
    volumes:
      # Operator sets HOSTTHIS_DATA_PATH to wherever they want sqlite +
      # blobs to persist on the host. Defaults to `./data` (relative to
      # this compose file, i.e. deploy/vps/data) if not set.
      - "${HOSTTHIS_DATA_PATH:-./data}:/var/lib/hostthis"
    environment:
      HOSTTHIS_URL_MODE: "${HOSTTHIS_URL_MODE:-subdomain}"
      HOSTTHIS_PUBLIC_SCHEME: "${HOSTTHIS_PUBLIC_SCHEME:-https}"
      HOSTTHIS_APEX_DOMAIN: "${HOSTTHIS_APEX_DOMAIN:?HOSTTHIS_APEX_DOMAIN is required}"
      HOSTTHIS_DATA_DIR: /var/lib/hostthis
      HOSTTHIS_LANDING: /app/web/landing.html
    user: "65532:65532"
